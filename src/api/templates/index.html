{% extends "base.html" %}

{% block title %}Predict · California Housing{% endblock %}

{% block content %}
<div class="ml-page-header">
  <div>
    <h1>Predict</h1>
    <div class="sub">LightGBM による住宅価格推論</div>
  </div>
</div>

<div class="ml-stack">
  <div class="ml-card">
    <div class="ml-card-title">Features</div>
    <form id="predict-form">
      <div class="ml-grid">
        {% for col in feature_cols %}
        <div class="ml-field">
          <label for="{{ col }}">{{ col }}</label>
          <input type="number" step="any" id="{{ col }}" name="{{ col }}"
                 value="{{ defaults[col] }}" required>
        </div>
        {% endfor %}
      </div>
      <div class="ml-actions">
        <button class="ml-btn" type="submit">Predict</button>
      </div>
    </form>
    <div id="result" class="ml-result">
      <div class="price" id="price"></div>
      <div class="unit" id="unit"></div>
    </div>
  </div>
</div>

<script>
  const form = document.getElementById("predict-form");
  const resultDiv = document.getElementById("result");
  const priceEl = document.getElementById("price");
  const unitEl = document.getElementById("unit");

  form.addEventListener("submit", async (e) => {
    e.preventDefault();
    const data = {};
    new FormData(form).forEach((v, k) => { data[k] = parseFloat(v); });

    resultDiv.className = "ml-result";
    try {
      const res = await fetch("/predict", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(data),
      });
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      const json = await res.json();
      priceEl.textContent = `$${(json.predicted_price * 100000).toLocaleString("en-US", { maximumFractionDigits: 0 })}`;
      unitEl.textContent = `raw value: ${json.predicted_price} ($100k units)`;
      resultDiv.className = "ml-result show";
    } catch (err) {
      priceEl.textContent = "Error";
      unitEl.textContent = err.message;
      resultDiv.className = "ml-result show error";
    }
  });
</script>
{% endblock %}
