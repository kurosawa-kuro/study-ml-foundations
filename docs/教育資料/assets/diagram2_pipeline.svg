<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="500" viewBox="0 0 1400 500">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#334155"/>
    </marker>
    <style>
      .title { font-family: "Noto Sans JP", "Hiragino Sans", "Yu Gothic", sans-serif; font-size: 28px; font-weight: 700; fill: #0f172a; }
      .txt { font-family: "Noto Sans JP", "Hiragino Sans", "Yu Gothic", sans-serif; font-size: 21px; fill: #0f172a; }
      .box { fill: #f8fafc; stroke: #334155; stroke-width: 2; rx: 12; ry: 12; }
      .accent { fill: #ecfccb; stroke: #65a30d; stroke-width: 2; rx: 12; ry: 12; }
      .db { fill: #ecfeff; stroke: #0f766e; stroke-width: 2; rx: 12; ry: 12; }
      .line { stroke: #334155; stroke-width: 3; fill: none; marker-end: url(#arrow); }
      .dashed { stroke-dasharray: 8 6; }
    </style>
  </defs>
  <text x="60" y="52" class="title">本プロジェクトの全体パイプライン</text>
  <rect x="60" y="180" width="160" height="70" class="db"/><text x="140" y="210" text-anchor="middle" class="txt">SQLite</text><text x="140" y="235" text-anchor="middle" class="txt">data/dev.db</text>
  <rect x="280" y="180" width="160" height="70" class="box"/><text x="360" y="210" text-anchor="middle" class="txt">データ取得</text><text x="360" y="235" text-anchor="middle" class="txt">seed / fetch</text>
  <rect x="500" y="180" width="160" height="70" class="box"/><text x="580" y="210" text-anchor="middle" class="txt">前処理</text><text x="580" y="235" text-anchor="middle" class="txt">preprocess.py</text>
  <rect x="720" y="180" width="180" height="70" class="box"/><text x="810" y="210" text-anchor="middle" class="txt">特徴量生成</text><text x="810" y="235" text-anchor="middle" class="txt">engineering.py</text>
  <rect x="960" y="180" width="160" height="70" class="accent"/><text x="1040" y="210" text-anchor="middle" class="txt">学習</text><text x="1040" y="235" text-anchor="middle" class="txt">train.py</text>
  <rect x="1180" y="180" width="160" height="70" class="accent"/><text x="1260" y="210" text-anchor="middle" class="txt">評価</text><text x="1260" y="235" text-anchor="middle" class="txt">metrics.py</text>
  <rect x="960" y="330" width="170" height="70" class="db"/><text x="1045" y="360" text-anchor="middle" class="txt">models/{run_id}</text><text x="1045" y="385" text-anchor="middle" class="txt">model.lgb</text>
  <rect x="1180" y="330" width="160" height="70" class="box"/><text x="1260" y="360" text-anchor="middle" class="txt">FastAPI</text><text x="1260" y="385" text-anchor="middle" class="txt">/predict</text>
  <rect x="500" y="330" width="240" height="70" class="db"/><text x="620" y="360" text-anchor="middle" class="txt">W&B / SQLite</text><text x="620" y="385" text-anchor="middle" class="txt">実験管理</text>
  <line x1="220" y1="215" x2="280" y2="215" class="line"/>
  <line x1="440" y1="215" x2="500" y2="215" class="line"/>
  <line x1="660" y1="215" x2="720" y2="215" class="line"/>
  <line x1="900" y1="215" x2="960" y2="215" class="line"/>
  <line x1="1120" y1="215" x2="1180" y2="215" class="line"/>
  <line x1="1040" y1="250" x2="1045" y2="330" class="line"/>
  <line x1="1130" y1="365" x2="1180" y2="365" class="line"/>
  <line x1="580" y1="250" x2="620" y2="330" class="line dashed"/>
  <line x1="810" y1="250" x2="660" y2="330" class="line dashed"/>
  <line x1="1040" y1="250" x2="700" y2="330" class="line dashed"/>
  <line x1="1260" y1="250" x2="740" y2="330" class="line dashed"/>
</svg>
