<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="420" viewBox="0 0 1400 420">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#334155"/>
    </marker>
    <style>
      .title { font-family: "Noto Sans JP", "Hiragino Sans", "Yu Gothic", sans-serif; font-size: 28px; font-weight: 700; fill: #0f172a; }
      .txt { font-family: "Noto Sans JP", "Hiragino Sans", "Yu Gothic", sans-serif; font-size: 22px; fill: #0f172a; }
      .box { fill: #f8fafc; stroke: #334155; stroke-width: 2; rx: 12; ry: 12; }
      .accent { fill: #ecfccb; stroke: #65a30d; stroke-width: 2; rx: 12; ry: 12; }
      .line { stroke: #334155; stroke-width: 3; fill: none; marker-end: url(#arrow); }
      .dashed { stroke-dasharray: 8 6; }
    </style>
  </defs>
  <text x="60" y="52" class="title">訓練データとテストデータの分割</text>
  <rect x="90" y="160" width="250" height="82" class="box"/><text x="215" y="195" text-anchor="middle" class="txt">全データ</text><text x="215" y="222" text-anchor="middle" class="txt">20,640 件</text>
  <rect x="510" y="90" width="290" height="94" class="accent"/><text x="655" y="127" text-anchor="middle" class="txt">訓練データ</text><text x="655" y="154" text-anchor="middle" class="txt">16,512 件 / 80%</text>
  <rect x="510" y="245" width="290" height="94" class="box"/><text x="655" y="282" text-anchor="middle" class="txt">テストデータ</text><text x="655" y="309" text-anchor="middle" class="txt">4,128 件 / 20%</text>
  <rect x="980" y="90" width="250" height="82" class="accent"/><text x="1105" y="125" text-anchor="middle" class="txt">学習</text><text x="1105" y="152" text-anchor="middle" class="txt">パラメータ最適化</text>
  <rect x="980" y="245" width="250" height="82" class="box"/><text x="1105" y="280" text-anchor="middle" class="txt">性能評価</text><text x="1105" y="307" text-anchor="middle" class="txt">学習には未使用</text>
  <line x1="340" y1="188" x2="510" y2="137" class="line"/>
  <line x1="340" y1="214" x2="510" y2="292" class="line"/>
  <line x1="800" y1="137" x2="980" y2="131" class="line"/>
  <line x1="800" y1="292" x2="980" y2="286" class="line"/>
  <line x1="1105" y1="172" x2="1105" y2="245" class="line dashed"/>
</svg>
