<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="420" viewBox="0 0 1400 420">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#334155"/>
    </marker>
    <style>
      .title { font-family: "Noto Sans JP", "Hiragino Sans", "Yu Gothic", sans-serif; font-size: 28px; font-weight: 700; fill: #0f172a; }
      .sub { font-family: "Noto Sans JP", "Hiragino Sans", "Yu Gothic", sans-serif; font-size: 24px; font-weight: 700; fill: #0f172a; }
      .txt { font-family: "Noto Sans JP", "Hiragino Sans", "Yu Gothic", sans-serif; font-size: 22px; fill: #0f172a; }
      .box { fill: #f8fafc; stroke: #334155; stroke-width: 2; rx: 12; ry: 12; }
      .green { fill: #ecfccb; stroke: #65a30d; stroke-width: 2; rx: 12; ry: 12; }
      .line { stroke: #334155; stroke-width: 3; fill: none; marker-end: url(#arrow); }
    </style>
  </defs>
  <text x="60" y="52" class="title">従来プログラミング vs 機械学習</text>
  <text x="300" y="100" text-anchor="middle" class="sub">従来のプログラミング</text>
  <text x="1040" y="100" text-anchor="middle" class="sub">機械学習</text>
  <rect x="80" y="160" width="160" height="64" class="box"/><text x="160" y="200" text-anchor="middle" class="txt">データ</text>
  <rect x="330" y="160" width="220" height="64" class="box"/><text x="440" y="200" text-anchor="middle" class="txt">人が書いたルール</text>
  <rect x="640" y="160" width="160" height="64" class="box"/><text x="720" y="200" text-anchor="middle" class="txt">出力</text>
  <line x1="240" y1="192" x2="330" y2="192" class="line"/>
  <line x1="550" y1="192" x2="640" y2="192" class="line"/>
  <rect x="840" y="150" width="150" height="56" class="green"/><text x="915" y="185" text-anchor="middle" class="txt">データ</text>
  <rect x="1050" y="150" width="160" height="56" class="green"/><text x="1130" y="185" text-anchor="middle" class="txt">学習</text>
  <rect x="1260" y="150" width="140" height="56" class="green"/><text x="1330" y="185" text-anchor="middle" class="txt">モデル</text>
  <rect x="840" y="250" width="170" height="56" class="green"/><text x="925" y="285" text-anchor="middle" class="txt">期待する出力</text>
  <rect x="1050" y="320" width="170" height="56" class="green"/><text x="1135" y="355" text-anchor="middle" class="txt">新しいデータ</text>
  <rect x="1260" y="320" width="140" height="56" class="green"/><text x="1330" y="355" text-anchor="middle" class="txt">予測出力</text>
  <line x1="990" y1="178" x2="1050" y2="178" class="line"/>
  <line x1="1210" y1="178" x2="1260" y2="178" class="line"/>
  <line x1="925" y1="250" x2="1090" y2="206" class="line"/>
  <line x1="1220" y1="348" x2="1260" y2="348" class="line"/>
  <line x1="1220" y1="320" x2="1280" y2="206" class="line"/>
</svg>
